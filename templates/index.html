<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skin Disease Classification</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 900px; margin: 0 auto; }
        header { text-align: center; color: white; margin-bottom: 30px; }
        header h1 { font-size: 2.5rem; margin-bottom: 10px; }
        header p { font-size: 1.1rem; opacity: 0.9; }
        .card { background: white; border-radius: 20px; padding: 40px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .upload-section { text-align: center; margin-bottom: 30px; }
        .upload-area { border: 3px dashed #667eea; border-radius: 15px; padding: 50px 20px; cursor: pointer; transition: all 0.3s; background: #f8f9fa; }
        .upload-area:hover { border-color: #764ba2; background: #f0f0f5; }
        .upload-area input[type="file"] { display: none; }
        .upload-icon { font-size: 60px; color: #667eea; margin-bottom: 15px; }
        .upload-text { color: #666; font-size: 1.1rem; }
        .btn { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 15px 40px; font-size: 1.1rem; border-radius: 30px; cursor: pointer; transition: transform 0.3s, box-shadow 0.3s; margin-top: 20px; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        #preview { display: none; margin: 20px auto; max-width: 300px; border-radius: 10px; box-shadow: 0 5px 20px rgba(0,0,0,0.2); }
        .results { display: none; margin-top: 30px; }
        .results h2 { color: #333; margin-bottom: 20px; text-align: center; }
        .prediction-card { background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%); border-radius: 15px; padding: 25px; margin-bottom: 20px; border-left: 5px solid #667eea; }
        .prediction-card.top { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border-left: 5px solid #ffd700; }
        .prediction-card h3 { font-size: 1.4rem; margin-bottom: 10px; }
        .confidence-bar { background: #ddd; border-radius: 10px; height: 25px; margin: 15px 0; overflow: hidden; }
        .confidence-fill { height: 100%; border-radius: 10px; transition: width 1s ease; }
        .top .confidence-bar { background: rgba(255,255,255,0.3); }
        .confidence-text { font-size: 1.1rem; font-weight: bold; }
        .disease-info { margin-top: 15px; padding: 15px; background: rgba(255,255,255,0.1); border-radius: 10px; line-height: 1.6; }
        .nav { display: flex; justify-content: center; gap: 20px; margin-top: 20px; }
        .nav a { color: white; text-decoration: none; padding: 10px 20px; border-radius: 20px; transition: background 0.3s; }
        .nav a:hover { background: rgba(255,255,255,0.2); }
        .loading { display: none; text-align: center; padding: 20px; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #667eea; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .error { background: #ff6b6b; color: white; padding: 15px; border-radius: 10px; text-align: center; display: none; }
        /* Hide any disclaimer elements */
        [class*="disclaimer"], [id*="disclaimer"], .warning-box, .alert-disclaimer { display: none !important; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Skin Disease Classification</h1>
            <p>AI-Powered Dermoscopic Image Analysis</p>
            <div class="nav">
                <a href="/">Home</a>
                <a href="/about">About</a>
            </div>
        </header>

        <div class="card">
            <div class="upload-section">
                <div class="upload-area" id="uploadArea">
                    <div class="upload-icon">📷</div>
                    <p class="upload-text">Click or drag image here to upload</p>
                    <input type="file" id="fileInput" accept="image/*">
                </div>
                <img id="preview" alt="Preview">
                <button class="btn" id="analyzeBtn" disabled>Analyze Image</button>
            </div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p style="margin-top: 15px;">Analyzing image...</p>
            </div>

            <div class="error" id="error"></div>

            <div class="results" id="results">
                <h2>Analysis Results</h2>
                <div id="predictions"></div>
            </div>
        </div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const preview = document.getElementById('preview');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const loading = document.getElementById('loading');
        const results = document.getElementById('results');
        const predictionsDiv = document.getElementById('predictions');
        const errorDiv = document.getElementById('error');

        uploadArea.addEventListener('click', () => fileInput.click());
        uploadArea.addEventListener('dragover', (e) => { e.preventDefault(); uploadArea.style.borderColor = '#764ba2'; });
        uploadArea.addEventListener('dragleave', () => { uploadArea.style.borderColor = '#667eea'; });
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = '#667eea';
            if (e.dataTransfer.files.length) { fileInput.files = e.dataTransfer.files; handleFileSelect(e.dataTransfer.files[0]); }
        });

        fileInput.addEventListener('change', (e) => { if (e.target.files.length) handleFileSelect(e.target.files[0]); });

        function handleFileSelect(file) {
            if (!file.type.startsWith('image/')) { showError('Please select an image file.'); return; }
            const reader = new FileReader();
            reader.onload = (e) => { preview.src = e.target.result; preview.style.display = 'block'; analyzeBtn.disabled = false; results.style.display = 'none'; errorDiv.style.display = 'none'; };
            reader.readAsDataURL(file);
        }

        analyzeBtn.addEventListener('click', async () => {
            const file = fileInput.files[0];
            if (!file) return;
            loading.style.display = 'block';
            results.style.display = 'none';
            errorDiv.style.display = 'none';
            analyzeBtn.disabled = true;
            const formData = new FormData();
            formData.append('file', file);
            try {
                const response = await fetch('/predict', { method: 'POST', body: formData });
                const data = await response.json();
                if (response.ok) { displayResults(data.predictions); }
                else { showError(data.error || 'An error occurred.'); }
            } catch (err) { showError('Failed to connect to server.'); }
            finally { loading.style.display = 'none'; analyzeBtn.disabled = false; }
        });

        function displayResults(predictions) {
            predictionsDiv.innerHTML = predictions.map((pred, index) => `
                <div class="prediction-card ${index === 0 ? 'top' : ''}">
                    <h3>${pred.name}</h3>
                    <div class="confidence-bar">
                        <div class="confidence-fill" style="width: 0%; background: ${index === 0 ? '#ffd700' : '#667eea'};"></div>
                    </div>
                    <p class="confidence-text">${pred.confidence}% Confidence</p>
                    ${pred.info ? `<div class="disease-info">${pred.info}</div>` : ''}
                </div>
            `).join('');
            results.style.display = 'block';
            setTimeout(() => {
                document.querySelectorAll('.confidence-fill').forEach(bar => {
                    bar.style.width = bar.parentElement.nextElementSibling.textContent;
                });
            }, 100);
        }

        function showError(message) { errorDiv.textContent = message; errorDiv.style.display = 'block'; }
    </script>
</body>
</html>
